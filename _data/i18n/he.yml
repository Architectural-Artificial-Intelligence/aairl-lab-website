# Members
members:
  jonathan-dortheimer:
    name: "יונתן דורטהיימר"
    description: "ראש המעבדה"
    bio: |
      יונתן דורטהיימר הוא אדריכל, מחנך וחוקר, ומייסד AAIRL — מעבדת המחקר לבינה מלאכותית בארכיטקטורה באוניברסיטת אריאל. הוא בוחן כיצד בינה מלאכותית, שיטות חישוביות וטכנולוגיות השתתפותיות יכולות לתמוך בעיצוב אדריכלי, תכנון עירוני וקבלת החלטות שקופה יותר.

      יונתן הוא מרצה בכיר ב[בית הספר לארכיטקטורה של אוניברסיטת אריאל](https://www.ariel.ac.il/wp/architecture/) וחוקר אורח ב[קתדרה לאינפורמטיקה אדריכלית](https://www.arc.ed.tum.de/ai/team/jonathan-dortheimer/)
       האוניברסיטה הטכנית של מינכן
       בגרמניה.

      הוא סיים דוקטורט ב-2021 באוניברסיטת תל אביב בהנחיית פרופ' [ערן נוימן](https://english.tau.ac.il/profile/eneuman) ופרופ' [טובה מילו](https://english.tau.ac.il/profile/milo), ולאחר מכן עבד כחוקר פוסט-דוקטורט במעבדת MTRL בטכניון, בשיתוף עם Future Automation Lab ב-Cornell Tech, בהנחיית פרופ' [אהרון שפרכר](https://architecture.technion.ac.il/members/aaron-sprecher/) ופרופ' [וונדי ג'ו](https://tech.cornell.edu/people/wendy-ju/).

      המחקר שלו מפתח ומעריך כלים חישוביים לעיצוב השתתפותי, AI עירוני ותאומים דיגיטליים עירוניים. הוא שואל כיצד AI יכול לתמוך בפרקטיקה אדריכלית ותכנונית מבלי לפגוע באחריות מקצועית, דיון ציבורי או ידע מקומי.

      לצד עבודתו האקדמית, יונתן ייסד מספר יוזמות טכנולוגיות והוא שותף-מייסד של [מעירים](https://meirim.org/), פלטפורמה לקידום השתתפות דמוקרטית בתכנון עירוני בישראל.  haya-brama:
    name: "חיה ברמה"
    bio: |
      ד"ר חיה ברמה היא חוקרת ומנהלת מעבדה ב-AAIRL, עם התמחות בלמידה עמוקה, למידת מכונה ויישומי AI למערכות אדריכלות ועירוניות.

      היא סיימה דוקטורט בנוירוביולוגיה באוניברסיטת בר-אילן, שם חקרה רשתות עצביות ביולוגיות באמצעות מודלינג דינמיקת אוכלוסיות והקלטות אלקטרופיזיולוגיות in vivo. המחקר הפוסט-דוקטורי שלה באוניברסיטת אריאל הרחיב בסיס חישובי זה לרשתות עצביות מלאכותיות, יישומי אבטחת סייבר וחיפוש מטא-הוריסטי.

      בין השנים 2000–2023 שימשה חיה כקצינת מדע ראשית ב-ARK, סטארטאפ שפיתח כלים מבוססי AI לעיצוב אדריכלי אוטומטי. מסלול זה — מנוירוביולוגיה מערכתית ללמידת מכונה יישומית בסביבה הבנויה — מעצב את עבודתה הנוכחית, המחברת מודלינג חישובי מחמיר עם בעיות תכנון ועיצוב מהעולם האמיתי.
  orly-moas-cohen:
    name: "אורלי מואס-כהן"
    bio: |
      אורלי מואס-כהן היא אדריכלית, מתכננת עירונית וחוקרת דוקטורט ב-AAIRL. יש לה ניסיון נרחב בתהליכי תכנון מורכבים, התחדשות עירונית ותעשייתית, שימור מורשת ותכנון אסטרטגי. היא מלמדת אדריכלות באוניברסיטת אריאל ומרצה על אדריכלות, התחדשות עירונית ושימור מורשת.
  shay-skital:
    name: "שי סקיטל"
    bio: |
      שי סקיטל הוא אדריכל, מתכנן עירוני וחוקר דוקטורט ב-AAIRL. הוא בעל תואר B.Arch מאוניברסיטת אריאל ותואר שני בגיאוגרפיה וסביבה אנושית מאוניברסיטת תל אביב. לפני שהצטרף למעבדה שימש שי בתפקידי תכנון ציבוריים בכירים, כולל אדריכל עיר וראש מחלקת תכנון ברשויות מקומיות שונות בישראל.
  hila-david:
    name: "הילה דוד"
    bio: |
      הילה דוד היא אדריכלית וסטודנטית לתואר שני ב-AAIRL. היא סיימה תואר ראשון באוניברסיטת אריאל, שם פרויקט הגמר שלה זכה בפרס אזריאלי לפרויקטי גמר מצטיינים.

      לפני שהצטרפה למעבדה עבדה הילה כאדריכלית בתכנון עירוני, מבני ציבור ופרויקטי מגורים. המחקר שלה עוסק בתקשורת אדריכלית חזותית — דיאגרמות, סוגי ייצוג, ותפקידם באינטראקציה בין אדם ל-AI בעיצוב.
  adiya-karmon:
    name: "עדיה כרמון"
    bio: |
      עדיה כרמון היא סטודנטית לאדריכלות באוניברסיטת אריאל ולתואר שני בארכיטקטורה בת-קיימא. המחקר שלה ב-AAIRL בוחן תכנון עירוני פרמטרי ככלי לתכנון עיר חכם וסביבתי יותר.

      היא מחברת עיצוב אדריכלי, שיטות חישוביות ופיתוח עירוני בר-קיימא — עם דגש על כיצד כלי תכנון יכולים לעזור להעריך חלופות ולשפר את איכות הסביבה הבנויה.
  bnaya-unger:
    name: "בניה אונגר"
    bio: |
      בניה אונגר הוא סטודנט לתואר ראשון בהנדסת תעשייה וניהול ולתואר שני במסלול מצוינות. המחקר שלו ב-AAIRL עוסק בתמיכת החלטות בהתחדשות עירונית. הוא מיישם שיטות למידת מכונה ולמידה עמוקה לזיהוי שילובי חלקות מבטיחים ולתמיכה בהחלטות תכנוניות שקופות ומבוססות-ראיות.
  elior-dahan:
    name: "אליאור דהן"
    bio: |
      אליאור דהן הוא סטודנט לתואר ראשון בהנדסת תעשייה וניהול ולתואר שני במסלול מצוינות. עבודתו ב-AAIRL תורמת למחקר התאום הדיגיטלי העירוני של המעבדה. הוא חוקר כיצד נתוני עיר, מודלים חישוביים וניתוח מבוסס-AI יכולים לתמוך בתהליכי תכנון שקופים ומבוססי ראיות.
  gaya-bitman:
    name: "גאיה ביטמן"
    bio: |
      גאיה ביטמן היא סטודנטית לאדריכלות בבית הספר לארכיטקטורה של אריאל ולתואר שני ב-AAIRL. המחקר שלה עוסק בשיטות עיצוב חישובי לבעיות אדריכלות שמעוצבות על ידי אילוצים תרבותיים, דתיים ומרחביים. העבודה הנוכחית שלה בוחנת שימוש באלגוריתמים גנטיים בעיצוב אדריכלות דתית.
  michael-sharon:
    name: "מיכאל שרון"
    bio: |
      מיכאל שרון הוא סטודנט לאדריכלות בבית הספר לארכיטקטורה של אריאל ועוזר מחקר ב-AAIRL. עבודתו בוחנת שיטות חישוביות מתקדמות לעיצוב אדריכלי.

      המחקר הנוכחי שלו מתמקד בכיצד מחשוב קוונטי וגישות חישוביות קשורות עשויות לתמוך בבעיות עיצוב מורכבות — ומחבר חשיבה אדריכלית, עיצוב חישובי וטכנולוגיות מתפתחות לחקר דרכים חדשות לחיפוש והערכת עיצוב.
  ofir-glassman:
    name: "עפרי גלסמן"
    bio: |
      עפרי גלסמן היא סטודנטית לאדריכלות בבית הספר לארכיטקטורה של אריאל ועוזרת מחקר ב-AAIRL. עבודתה עוסקת בצומת שבין עיצוב אדריכלי, AI וחוויה אנושית בסביבות בנויות. המחקר שלה בוחן כיצד AI יכול לקרב היבטים של התנהגות אנושית ותגובה מרחבית.
  gal-gendler:
    name: "גל גנדלר"
    bio: |
      גל גנדלר הוא חוקר רב-תחומי עם מומחיות בהנדסת תוכנה, מדיניות ציבורית ותכנון ערים. הוא בעל תואר ראשון במדעי המחשב, תואר שני במדיניות ציבורית ותואר שני בהצטיינות מ-UCL בתחבורה ותכנון עיר. עבודתו ב-AAIRL התמקדה בפלטפורמות AI עירוניות ובתשתיות נתונים מרחביים.
  gal-guz:
    name: "גל גוז"
    bio: |
      גל גוז הוא סטודנט לאדריכלות, מעצב UX/UI ובוגר AAIRL. הוא משלב עיצוב אדריכלי, עיצוב ממשקים ופיתוח תוכנה למערכות מחקר מורכבות. ב-AAIRL תרם גל לפרויקטים בהערכה אדריכלית נתמכת-AI ותמיכת החלטות בתכנון עירוני.
  ela-moyal:
    name: "אלה מויאל"
    bio: |
      אלה מויאל היא אדריכלית ובוגרת AAIRL. המחקר שלה עסק במדיניות התחדשות עירונית בישראל, עם התמקדות בתוכניות שיפוץ חזיתות בתל אביב והשלכותיהן על עיצוב עירוני, איכות דיור וחוויית החיים של התושבים.
  gilad-chalfon:
    name: "גלעד חלפון"
    bio: |
      גלעד חלפון הוא אדריכל ובוגר AAIRL. המחקר שלו בחן את ההשלכות הפוליטיות והחברתיות של יישומי עיר חכמה, עם התמקדות בכיצד טכנולוגיות חניה מתפקדות ככלים של הפרטה וממשל בערים ישראליות.
  lielle-brenner:
    name: "ליאל ברנר"
    bio: |
      ליאל ברנר היא בוגרת AAIRL. עבודתה תרמה למחקר Design AI של המעבדה, שבוחן כיצד AI יכול לתמוך ביצירתיות אדריכלית, תקשורת עיצובית והערכה אמפירית של סביבות בנויות.

jobs:
  phd:
    title: "דוקטורט"
    intro: "אנחנו מקבלים מועמדים לדוקטורט שרוצים לעשות מחקר רציני בצומת שבין AI לאדריכלות ותכנון עירוני — מחקר שמושרש בבעיות אמיתיות ומתפתח בשיתוף שותפים מהעירייה ומהתעשייה."
    about:
      - "פיתוח אג'נדת מחקר סביב בעיית תכנון ועיצוב אמיתית"
      - "בניית שיטות או כלים ואימותם אמפירית"
      - "עבודה עם נתונים מהעולם האמיתי ולעיתים קרובות עם לולאות משוב מהשותפים"
      - "פרסום לאורך כל הדוקטורט, לעיתים קרובות כמחבר ראשון"
      - "תרומה לתשתית המעבדה כשרלוונטי (מאגרי נתונים, benchmarks, כלים)"
      - "מימון מלא מבוסס-פרויקט"
    look:
      - "מוטיבציה חזקה למחקר ולכתיבה"
      - "יכולת כמותית או חישובית (ML, סטטיסטיקה, סימולציה, אופטימיזציה — כל שילוב)"
      - "יכולת לעבוד באופן עצמאי תוך שיתוף פעולה עם הקבוצה"
      - "מוזמנים בוגרי אדריכלות, מדעי המחשב, הנדסה, לימודים עירוניים ועוד"
    body: |
      **למעבדה יש משרות דוקטורט מממונות-פרויקט.** להבעת עניין, שלחו מייל ל[ד"ר חיה ברמה](mailto:hayab@ariel.ac.il) עם נושא "PhD inquiry" וכללו:

      * קורות חיים
      * גיליונות ציונים
      * פסקה קצרה המתארת את תחומי העניין שלכם וניסיון רלוונטי
      * (אופציונלי) דוגמת כתיבה / תיק עבודות / GitHub / תזה קודמת

      פרטים נוספים זמינים ב[אתר הדוקטורט של אוניברסיטת אריאל](https://www.ariel.ac.il/wp/graduate-school/en/applicants/).
  master:
    title: "תואר שני במסלול תזה"
    intro: "אנחנו מקבלים סטודנטים לתואר שני במסלול תזה בלבד. המסלול הזה מתאים במיוחד לסטודנטים שמתכננים להמשיך לדוקטורט או שרוצים הכשרת מחקר רצינית. אצלנו במעבדה עובדים על מערכי נתונים אמיתיים ושאלות מחקר שנובעות ישירות מהפרויקטים הפעילים."
    about:
      - "רכישת כישורי מחקר, תיק עבודות חזק ומבט מציאותי על מחקר אקדמי ויישומי"
      - "השלמת פרויקט מחקר"
      - "בניית שיטות או כלים ואימותם אמפירית"
      - "תזה כתובה עם תרומה ברורה"
      - "לעיתים קרובות הגשה לכנס או לכתב עת"
    look:
      - "מוטיבציה חזקה למחקר ולכתיבה"
      - "עניין במחקר חישובי, אמפירי או מוכוון-עיצוב"
      - "יכולת לעבוד באופן עצמאי תוך קבלת הנחיה צמודה"
      - "כישורים רלוונטיים בעיצוב, תכנון, ניתוח נתונים, תכנות או כלים מרחביים"
      - "זמינות לעבודת תזה מתמשכת בתוך פרויקטים פעילים של המעבדה"
    body: |
      שלחו מייל ל[ד"ר חיה ברמה](mailto:hayab@ariel.ac.il) עם קורות חיים וגיליונות ציונים, עם נושא "Master's Thesis Application".
      בגוף המייל, כללו:

      * תוכנית הלימודים שלכם והשנה הנוכחית
      * תיאור קצר של תחומי העניין שלכם (2–3 נושאים)
      * כישורים רלוונטיים (תוכנות/כלים/קורסים) וזמינות שבועית

      פרטים נוספים זמינים ב[אתר ה-MSc בארכיטקטורה של אוניברסיטת אריאל](https://www.ariel.ac.il/wp/architecture/m-d/).
  postdoc:
    title: "פוסט-דוקטורט"
    intro: "אנחנו מחפשים חוקרים פוסט-דוקטורנטים עם רקע כמותי או חישובי חזק, שרוצים לעשות עבודה בעלת השפעה אמיתית ב-AI עירוני, עיצוב חישובי, אנליטיקה מרחבית או תכנון מונחה-נתונים."
    about:
      - "פיתוח אג'נדת מחקר סביב בעיית תכנון ועיצוב אמיתית"
      - "בניית שיטות או כלים ואימותם אמפירית"
      - "עבודה עם נתונים מהעולם האמיתי ולעיתים קרובות עם לולאות משוב מהשותפים"
      - "פרסום מאמרים איכותיים בכתבי עת וכנסים"
      - "תרומה לתשתית המעבדה כשרלוונטי (מאגרי נתונים, benchmarks, כלים)"
      - "מימון מלא מבוסס-פרויקט"
    look:
      - "AI עירוני ו-ML לתמיכת החלטות בעיצוב ותכנון"
      - "אינטראקציה אדם–AI לכלי עיצוב"
      - "אנליטיקה מרחבית, סימולציה ו-benchmarking"
      - "מחקר יישומי עם שותפים ציבוריים/פרטיים"
    body: |
      **למעבדה יש משרות פוסט-דוקטורט מממונות-פרויקט.** להגשת מועמדות, שלחו מסמך PDF אחד (עד 10MB) ל[ד"ר חיה ברמה](mailto:hayab@ariel.ac.il) עם נושא "Postdoctoral application". ה-PDF צריך לכלול:

      * קורות חיים
      * מכתב כוונות המתאר את תחומי המחקר שלכם והתאמתכם ל-AAIRL
      * עד 3 פרסומים או דוגמאות עבודה

      פרטים נוספים זמינים ב[אתר הפוסט-דוקטורט של אוניברסיטת אריאל](https://www.ariel.ac.il/wp/postdocs/).
