topics:
  design-ai:
    title: "עיצוב AI"
    intro: "אנחנו חוקרים כיצד בינה מלאכותית יכולה לחזק יצירתיות, שיתוף פעולה ושיקול דעת אנושי בעיצוב אדריכלי ותכנון — ואיפה היא נכשלת."
    body: |
      עיצוב הוא צורת חשיבה איטרטיבית, מוקדית וחזותית מאוד. העבודה שלנו בתחום עיצוב AI שואלת כיצד מערכות חישוביות יכולות לתמוך בתהליך הזה מבלי לצמצם אותו לכתיבת פרומפטים או יצירת תמונות אוטומטית.

      אנחנו חוקרים AI כשותף בשלב הרעיון הראשוני, תקשורת עיצובית, השתתפות ציבורית והערכה. זה כולל מערכות שיחתיות לעיצוב השתתפותי, צ'אטבוטים ויזואליים שיכולים להסתייע בדיאגרמות וייצוגים מרחביים, ושיטות לקירוב היבטים נבחרים של תגובה אנושית למרחבים אדריכליים.

      המיקוד המדעי שלנו הוא מתי המערכות האלה שימושיות, מתי הן נכשלות, וכיצד הן משנות את היחס בין מעצבים, בעלי עניין וראיות עיצוביות. אנחנו משלבים פיתוח אב-טיפוס עם הערכה אמפירית — מחקרי משתמשים, ניסויי עיצוב והשוואות עם שיטות השתתפות והערכה מבוססות.

      המטרה ארוכת-הטווח אינה להחליף מעצבים, אלא לפתח כלי AI שקופים שמרחיבים את סוגי המשוב, הייצוג וההרהור הזמינים בעיצוב — תוך שמירה על שיקול הדעת האנושי במרכז התהליך.
  smart-cities:
    title: "ערים חכמות"
    intro: "כלים חישוביים משמעותיים דורשים הבנה מושרשת של הערים והקהילות שעבורן הם נבנים."
    body: |
      בניית כלים חישוביים שימושיים לערים דורשת הבנה כיצד ערים אכן עובדות — חברתית, מרחבית ופוליטית. חלק משמעותי מהמחקר שלנו מוקדש לכן לחקר החיים העירוניים, לא רק למידול שלהם.

      עבודת המחקר העירוני שלנו בוחנת מספר נושאים קשורים זה בזה: ההשלכות הממשלתיות של טכנולוגיות עיר חכמה; הדינמיקות החברתיות והמרחביות של התחדשות עירונית בישראל, כולל עקירה, צפיפות והתפלגות לא שוויונית של הטבות; הארגון המרחבי של קהילות דתיות ומיעוטים; וכלכלה פוליטית של מוסדות תכנון.

      המחקר הזה אינו סטייה מהעבודה החישובית שלנו — הוא בסיס לה. ידע אמפירי על תהליכים עירוניים עוזר לנו לזהות היכן כלי AI נחוצים, מה הם צריכים לעשות, ואילו סיכונים הם צריכים לנהל. הוא גם עוזר לנו להעריך האם הכלים שאנחנו בונים משקפים את המורכבות ואת השיקולים של שוויון שחשובים בפרקטיקת תכנון אמיתית.
  urban-ai:
    title: "בינה מלאכותית עירונית"
    intro: "אנחנו מפתחים ומעריכים שיטות AI לניתוח דינמיקה עירונית, ניבוי תוצאות סוציו-כלכליות ותמיכה בהחלטות תכנוניות — תוך תשומת לב מפורשת למגבלות המודל, לפרשנות ולאימות בשטח."
    body: |
      החלטות תכנון עירוני מעוצבות יותר ויותר על ידי נתונים, מודלים ופלטפורמות דיגיטליות. המחקר שלנו בתחום הבינה המלאכותית העירונית בוחן כיצד טכנולוגיות אלה יכולות להיות מתוכננות, מוערכות ומנוהלות כך שיתמכו בפרקטיקת התכנון במקום לטשטש אותה.

      אנחנו מפתחים מודלי למידת מכונה, מערכות תמיכה בקבלת החלטות ושיטות תאום דיגיטלי עירוני לבעיות כמו התחדשות עירונית, הערכת השפעה סוציו-כלכלית, צבירת חלקות וסימולציה עירונית רב-תחומית. הפרויקטים האלה משלבים נתונים מרחביים, ידע תכנוני ומידול חישובי כדי לעזור לתכנונאים להשוות חלופות לפני שהתערבויות מיושמות.

      אנחנו גם חוקרים את המגבלות הידועות של הבינה המלאכותית העירונית: נתונים מפוצלים והטרוגניים, הטיה במודלים, ניידות ירודה בין ערים, וקושי לתרגם תפוקות טכניות לראיות תכנוניות ישימות. העבודה שלנו מדגישה לכן פרשנות, הערכת ביצועים קפדנית ואימות בהקשרי תכנון אמיתיים לצד מוסדות שותפים.

      המטרה היא לבסס AI עירוני כתשתית מחקר ותכנון אמינה ובדיקה — כזו שיועילה לא רק בתנאים אידיאליים, אלא גם בסביבות דלות-נתונים ומורכבות שבהן רוב התכנון האמיתי מתרחש.
projects:
  chatbots:
    title: "צ'אטבוטים לעיצוב"
    intro: "הפרויקט מפתח ומעריך מערכות AI שיחתיות להשתתפות ציבורית בעיצוב אדריכלי ותכנון עירוני."
    body: |
      צ'אטבוטים לעיצוב בוחנים איך AI שיחתי יכול לתמוך בהשתתפות ציבורית באדריכלות, עיצוב עירוני ותכנון. הפרויקט מפתח ומעריך אבות-טיפוס שעוזרים לצוותי עיצוב לאסוף קלטים עשירים יותר, לנהל דיאלוג עם קהלים רחבים יותר, ולתרגם ידע קהילתי למידע עיצובי מובנה.

      האתגר המרכזי הוא בקנה מידה. מפגשים ציבוריים, סדנאות וסקרים מדירים אנשים מסיבות של זמן, שפה, ביטחון עצמי, מומחיות תחומית או נגישות פיזית. מערכות שיחתיות מציעות ערוץ השתתפות אחר: כזה שזמין באופן אסינכרוני, מסתגל למשתמשים שונים, ומסוגל לעורר תגובות מעמיקות יותר מאמצעים רגילים.

      המחקר שלנו הוא אמפירי: אנחנו בודקים היכן צ'אטבוטים מצליחים לעומת שיטות השתתפות מבוססות, היכן הם נכשלים, וכיצד צריך לשלב אותם עם הנחיה אנושית. אנחנו מתעניינים במיוחד במודלים היברידיים — כלי AI שמרחיבים את ההגעה בעוד שסדנאות פנים-אל-פנים ממשיכות לבנות אמון, לייצר דיון ולאפשר שיתוף בקבלת ההחלטות.

      העבודה הנוכחית מתמקדת בצ'אטבוטים ויזואליים שמתקשרים דרך טקסט, דיאגרמות וייצוגים מרחביים. המערכות האלה מאפשרות למשתתפים ולמעצבים לדון בהצעות ביחס למידע מרחבי קונקרטי, לא רק לתיאורים מופשטים. המטרה אינה להחליף את הדיאלוג הציבורי — אלא לשפר את הממשקים בין קהילות, צוותי עיצוב והמידע המורכב שכרוך בהחלטות תכנון.
  synthetic-humans:
    title: "אנשים סינתטיים"
    intro: "הפרויקט בוחן האם מודלי AI יכולים לקרב היבטים נבחרים של חוויה מרחבית אנושית כדי לספק משוב עיצובי בשלב מוקדם — ומזהה בקפידה היכן הם לא מסוגלים לעשות זאת."
    body: |
      אנשים סינתטיים שואל שאלה ממוקדת: האם מודלים חישוביים יכולים לקרב היבטים נבחרים של חוויה מרחבית אנושית בדרכים שיועילו להערכת עיצוב אדריכלי בשלב מוקדם?

      ב"אנשים סינתטיים" הכוונה למערכות AI — בעיקר מודלי שפה ומודלי ראייה-שפה — שנבחנים על יכולתם לדמות היבטים מוגדרים של תגובה אנושית: דפוסי קשב, דירוגים רגשיים, שיפוטי העדפה והערכות קריאות מרחבית. הטענה אינה שהמודלים האלה מבינים מרחב. הטענה היא שהפלטים שלהם עשויים להתאם מספיק לתגובות אנושיות כדי לשמש כאותות הערכה בעלות נמוכה וניתנים להרחבה — בשלבי תהליך העיצוב שבהם משוב אנושי אינו זמין או יקר מדי.

      הפרויקט נובע מפער אמיתי בפרקטיקה האדריכלית. בשלבי עיצוב מוקדמים, ההערכה מסתמכת הרבה על אינטואיציה ותקדים. פאזלים פיזיים ומחקרי משתמשים הם עתירי משאבים. מודלי AI, בשימוש זהיר, עשויים לעזור למעצבים להשוות חלופות, לחשוף דפוסי חוויה סבירים ולזהות שאלות שדורשות אימות אנושי.

      העבודה הנוכחית משווה כיצד מודלי ראייה-שפה גדולים מדרגים תמונות אדריכליות על פי ממדים רגשיים, ומשווה דירוגים אלה לנתונים שנאספו ממשתתפים אנושיים. אנחנו בוחנים עוצמת מתאם, דפוסי כישלון, והשפעת סגנון הייצוג — כולל הממצא שהסכמת מודל-אדם על תגובות רגשיות שליליות חזקה משמעותית מאשר על חיוביות. ההבחנות האלה חשובות לשימוש אחראי. המטרה שלנו היא לזהות במדויק היכן AI יכול להרחיב הערכת עיצוב, והיכן הוא לא יכול להחליף את שיקול הדעת של המעצב או את קולו של המשתמש.
  urban-digital-twin:
    title: "METROPOLIS: תאום דיגיטלי עירוני"
    intro: "מסגרת תאום דיגיטלי עירוני פתוחה ואינטרופרבילית לשילוב נתוני עיר, פריסת מודלי AI עירוניים ותמיכה בתכנון מבוסס ראיות."
    body: |
      METROPOLIS מפתחת מסגרת תאום דיגיטלי עירוני פתוחה ואינטרופרבילית לתכנון, סימולציה ותמיכה בקבלת החלטות. הפרויקט מגיב לפער אמיתי: ערים צריכות יותר ויותר להעריך את ההשלכות של החלטות תכנון גדולות לפני שמיישמים אותן, אבל התשתית הטכנית לעשות את זה באמינות עדיין לא קיימת בקנה מידה.

      תאומים דיגיטליים עירוניים יכולים, לפחות עקרונית, לחבר נתונים מרחביים, הזנות בזמן אמת, רשומות היסטוריות ומודלים חיזויים לסביבה אנליטית אחת. בפועל, המערכות האלה קשות לבנייה ולתחזוקה. נתונים עירוניים מפוצלים בין סוכנויות וספקים, מאוחסנים בפורמטים לא תואמים ומנוהלים לפי סטנדרטים מוסדיים שונים. מודלי AI דורשים קלטים הטרוגניים שנדיר שמגיעים בפורמטים תואמים, וערים חסרות כלי תיאום תהליכי עבודה ואמות מידה שדרושים לשילוב מודלים לתהליכי תכנון קוהרנטיים.

      METROPOLIS מתמודדת עם האתגרים האלה על ידי פיתוח תשתיות טכניות ספציפיות: שכבת יכולת פעולה הדדית של נתונים, ממשק מודולרי לפריסת מודלי AI עירוניים, צינורות יצירת תרחישים שמתאמים מודלים מרובים, ואמות מידה השוואתיות להערכת ביצועי מודלים בין ערים והקשרי תכנון שונים. המסגרת מאומתת דרך פיילוט עם תל אביב.

      התרומה של הפרויקט היא תשתית — לא מודל בודד או תחזית. על ידי הפיכת טכנולוגיית התאום הדיגיטלי העירוני למודולרית, מתועדת וניתנת לשכפול, METROPOLIS שואפת להוריד את הרף לחוקרים ועיריות שרוצים לבנות על העבודה ההדדית ולקבוע סטנדרטים מעשיים לשילוב AI עירוני.
  urban-social-prediction:
    title: "חיזוי חברתי עירוני"
    intro: "הפרויקט מפתח ומאמת מודלי למידת מכונה לניבוי תוצאות חברתיות וכלכליות של התחדשות עירונית, ומתרגם אותם לכלי תכנון פרשניים."
    body: |
      חיזוי חברתי עירוני מפתח מודלי למידת מכונה וכלי תמיכה בקבלת החלטות לניבוי התוצאות החברתיות והכלכליות של התחדשות עירונית. הפרויקט מתמודד עם בעיית תכנון ממשית: להחלטות התחדשות יש השפעות ארוכות טווח על דיור, עקירה וחוסן קהילתי — אבל ההשלכות האלה לרוב אינן גלויות לתכנונאים בזמן קבלת ההחלטות.

      התחדשות עירונית יוצרת לחץ על היצע הדיור, תשתיות, שירותים ורשתות חברתיות. היא יכולה להביא השקעה ולשפר תנאי מגורים, אבל גם לגרום לעקירה, לחלוקה לא שוויונית של הטבות ולנזק ממוקד מקומי. הפרויקט הזה משתמש בשיטות מונעות-נתונים כדי לחשוף את הדינמיקות האלה לפני שההתערבויות מתקבעות.

      העבודה הטכנית שלנו משלבת מודלינג חיזויי, ניתוח מרחבי וממשקים פרשניים שמיועדים לשימוש של אנשי מקצוע בתכנון. אנחנו בוחנים אילו גורמים סוציו-מרחביים מעצבים תוצאות התחדשות, כיצד מודלים מכלילים בין הקשרים עירוניים שונים, וכיצד יש להציג תחזיות לצוותי תכנון — כך שיעזרו לקבל החלטות בלי להיתפס כמרשמים.

      הפרויקט מפתח גם כלי המלצה לתכנון התחדשות עירונית אסטרטגית. הכלים האלה עוזרים לבעלי עניין להשוות אפשרויות לצבירת חלקות, להעריך אילוצי היתכנות, לאמוד פוטנציאל פיתוח מחדש ולנמק על קריטריונים לתעדוף. כל הפלטים מתוכננים לתמוך בדיון — לא להחליפו — תוך שמירה על שוויון חברתי, הקשר מקומי ושיקול דעת המתכנן במרכז התהליך.

