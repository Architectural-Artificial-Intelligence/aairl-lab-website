# Members
members:
  jonathan-dortheimer:
    name: "Jonathan Dortheimer"
    description: "Head of Lab"
    bio: |
      Jonathan Dortheimer is an architect, educator, researcher, and founder of the Architectural Artificial Intelligence Research Lab at Ariel University. His work examines how artificial intelligence, computational methods, and participatory technologies can support architectural design, urban planning, and more transparent decision-making.

      Jonathan is a senior lecturer at the [Ariel University School of Architecture](https://www.ariel.ac.il/wp/architecture/en/) and a guest scholar at the [Chair of Architectural Informatics, Technical University of Munich](https://www.arc.ed.tum.de/ai/team/jonathan-dortheimer/) in Germany.

      He completed his doctoral studies in 2021 at Tel Aviv University under the supervision of Prof. [Eran Neuman](https://english.tau.ac.il/profile/eneuman) and Prof. [Tova Milo](https://english.tau.ac.il/profile/milo). He later worked as a postdoctoral researcher at the Material Topology Research Lab at the Technion, in collaboration with the Future Automation Lab at Cornell Tech, under the supervision of Prof. [Aaron Sprecher](https://architecture.technion.ac.il/members/aaron-sprecher/) and Prof. [Wendy Ju](https://tech.cornell.edu/people/wendy-ju/).

      Jonathan's research develops and evaluates computational tools for participatory design, urban AI, and urban digital twins. Across these areas, his work asks how AI can meaningfully support architectural and planning practice without displacing professional responsibility, public deliberation, or local knowledge.

      Alongside his academic work, Jonathan has founded several technology initiatives and co-founded [Meirim](https://meirim.org/), a platform promoting democratic participation in urban planning in Israel.
  haya-brama:
    name: "Haya Brama"
    bio: |
      Dr. Haya Brama is a researcher and lab manager at AAIRL, specializing in deep learning, machine learning, and AI applications for architectural and urban systems.

      She completed her Ph.D. in neuroscience at Bar-Ilan University, where she studied biological neural networks using population-dynamics modeling and in-vivo electrophysiological recordings. Her postdoctoral research at Ariel University's Department of Industrial Engineering and Management extended this computational foundation to artificial neural networks, cybersecurity applications, and metaheuristic search.

      From 2000 to 2023, Haya served as Chief Scientific Officer at ARK, a startup developing AI-based tools for automated architectural design. This trajectory — from systems neuroscience to applied machine learning in the built environment — informs her current work connecting rigorous computational modeling with practical planning and design problems.
  orly-moas-cohen:
    name: "Orly Moas-Cohen"
    bio: |
      Orly Moas-Cohen is an architect, urban planner, and Ph.D. researcher at AAIRL. She brings extensive experience in complex planning processes, urban and industrial renewal, heritage preservation, public service, management, and strategic consulting.

      She holds an M.Arch. from the Technion and a B.Arch. from Ariel University. Over two decades of professional practice, Orly has led planning teams, advanced large-scale urban projects, and served on planning committees, including national and district-level committees in Israel.

      Orly teaches architecture at Ariel University and lectures on architecture, urban renewal, heritage preservation, and strategic planning. Her research connects professional planning knowledge with the lab's interest in resilient, socially aware, and evidence-based urban development.

      Across her work, Orly emphasizes human-centered planning, urban quality of life, and the long-term social and environmental consequences of planning decisions.
  shay-skital:
    name: "Shay Skital"
    bio: |
      Shay Skital is an architect, urban planner, and Ph.D. researcher at AAIRL. He holds a B.Arch. from Ariel University and an M.A. in Geography and the Human Environment, with a specialization in Urban and Regional Planning and Design, from Tel Aviv University.

      Before joining the lab, Shay served in senior public-sector planning roles, including City Architect and Head of Planning Department in several local authorities in Israel. His professional work included complex planning processes, new neighborhood planning, heritage preservation, urban renewal, commercial and employment zones, tourism-oriented planning, public buildings, and public space design.

      At AAIRL, Shay's research connects urban planning practice with digital tools for city analysis and decision support. His work emphasizes place-sensitive planning, local identity, and the use of urban data to improve the experience and value cities offer to residents and visitors.
  hila-david:
    name: "Hila David"
    bio: |
      Hila David is an architect and master's student at AAIRL. She completed her bachelor's degree at Ariel University, where her final project received the Azrieli Prize for Outstanding Final Projects.

      Before joining the lab, Hila worked as an architect on urban planning, public buildings, and residential projects. Her research focuses on visual architectural communication, including diagrams, representation types, and their role in human-AI interaction for design.
  adiya-karmon:
    name: "Adiya Karmon"
    bio: |
      Adiya Karmon is an architecture student at Ariel University and a master's student in sustainable architecture. Her research at AAIRL explores parametric urban planning as a method for supporting more informed and environmentally responsive city planning.

      Her work connects architectural design, computational methods, and sustainable urban development, with an emphasis on how planning tools can help evaluate alternatives and improve the quality of the built environment.
  bnaya-unger:
    name: "Bnaya Unger"
    bio: |
      Bnaya Unger is a B.Sc. student in Industrial Engineering and Management and an honors-track M.Sc. student in Industrial Engineering and Management. His research at AAIRL focuses on urban renewal decision support.

      As part of a collaborative project with Green Group, Bnaya studies parcel aggregation for urban renewal. His work applies machine learning and deep learning methods to identify promising parcel combinations and support more transparent, evidence-based planning decisions.
  elior-dahan:
    name: "Elior Dahan"
    bio: |
      Elior Dahan is a B.Sc. student in Industrial Engineering and Management and an honors-track M.Sc. student in Industrial Engineering and Management. His work at AAIRL contributes to the lab's Urban Digital Twin research.

      Elior studies how urban data, computational models, and AI-based analysis can support more transparent and evidence-based planning processes. His work is connected to the lab's effort to develop interoperable digital infrastructure for urban simulation, decision support, and model evaluation.
  gaya-bitman:
    name: "Gaya Bitman"
    bio: |
      Gaya Bitman is an architecture student at the Ariel School of Architecture and a master's student at AAIRL. Her research explores computational design methods for architectural problems shaped by cultural, religious, and spatial constraints.

      Her current work studies the use of genetic algorithms in the design of religious architecture. The research connects rule-based design, optimization, and architectural reasoning, showing how computational methods can help designers explore constrained design spaces more systematically.
  michael-sharon:
    name: "Michael Sharon"
    bio: |
      Michael Sharon is an architecture student at the Ariel School of Architecture and a research assistant at AAIRL. His work explores advanced computational methods for architectural design.

      Michael's current research focuses on how quantum computing and related computational approaches may support complex design problems. His work connects architectural reasoning, computational design, and emerging technologies for exploring new kinds of design search and evaluation.
  ofir-glassman:
    name: "Ofir Glassman"
    bio: |
      Ofir Glassman is an architecture student at the Ariel School of Architecture and a research assistant at AAIRL. Her work focuses on the intersection of architectural design, AI, and human experience in built environments.

      Ofir's research studies how AI can approximate aspects of human behavior and spatial response, helping designers evaluate built environments beyond conventional performance metrics. Her work contributes to the lab's Synthetic Humans and Design AI research directions.
  gal-gendler:
    name: "Gal Gendler"
    bio: |
      Gal Gendler is a multidisciplinary researcher with expertise in software engineering, public policy, and city planning. He holds a B.Sc. in Computer Science, an M.A. in Public Policy, and an M.Sc. with distinction from UCL in Transport and City Planning.

      Before joining AAIRL, Gal worked in the technology sector as a software engineer, specializing in geographic information systems, big data, and transport planning. This background informs his research on urban AI platforms, spatial data infrastructure, and planning decision-support systems.

      Gal's work at AAIRL focused on urban renewal policy and the development of an urban AI platform for hosting machine-learning models for the built environment. His research contributed to the lab's broader effort to make urban analytics more interoperable, transparent, and useful for planning practice.
  gal-guz:
    name: "Gal Guz"
    bio: |
      Gal Guz is an architecture student, UX/UI designer, and alumnus of AAIRL. His work combines architectural design, interface design, and software development for complex research systems.

      At AAIRL, Gal contributed to projects on AI-supported architectural evaluation and urban planning decision support. His work included interface design for systems that predict social impacts of urban renewal and research on whether AI tools can approximate human responses to built spaces.

      Gal's design practice spans user requirements, operational concept development, prototyping, user testing, design systems, and development handoff. He works primarily with the React ecosystem and 3D web technologies such as Three.js.
  ela-moyal:
    name: "Ela Moyal"
    bio: |
      Ela Moyal is an architect and alumna of AAIRL. Her research examined urban renewal policy in Israel, focusing on facade renovation programs in Tel Aviv and their implications for urban design, housing quality, and the lived experience of residents.

      Her work contributed to the lab's urban studies research, which investigates how planning policies and development mechanisms shape built environments and communities.
  gilad-chalfon:
    name: "Gilad Chalfon"
    bio: |
      Gilad Chalfon is an architect and alumnus of AAIRL. His research examined the political and social implications of smart city applications, with a focus on how parking technologies function as instruments of privatization and governance in Israeli cities.

      His work contributed to the lab's critical urban studies research, which investigates the power relations and institutional responsibilities embedded in digital systems for cities.
  lielle-brenner:
    name: "Lielle Brenner"
    bio: |
      Lielle Brenner is an alumna of AAIRL. Her work contributed to the lab's Design AI research, which studies how AI can support architectural creativity, design communication, and empirical evaluation of built environments.

