      - "Build methods or tools and validate them empirically"
      - "A written thesis with a clear contribution"
      - "Often a submission to a conference/journal"
    look:
      - "Strong motivation for research and writing"
      - "Interest in computational, empirical, or design-oriented research"
      - "Ability to work independently while receiving close supervision"
      - "Relevant skills in design, planning, data analysis, programming, or spatial tools"
      - "Availability for sustained thesis work within ongoing lab projects"
    body: |
      Email [Dr. Haya Brama](mailto:hayab@ariel.ac.il) with your CV and transcripts, using the subject line "Master's Thesis Application".
      In the email body, include:

      * Your degree program and year
      * A short description of your interests (2–3 topics)
      * Relevant skills (software/tools/courses) and your weekly availability

      More details are available on Ariel University's [MSc in Architecture website](https://www.ariel.ac.il/wp/architecture/m-d/).
  postdoc:
    title: "Postdoctoral Fellows"
    intro: "We seek postdoctoral researchers with a strong quantitative or computational background who want to conduct high-impact work in urban AI, computational design, spatial analytics, or data-driven planning."
    about:
      - "Develop a research agenda around a real planning and design problem"
      - "Build methods or tools and validate them empirically"
      - "Work with real-world data and, in many cases, partner feedback loops"
      - "Publish high-quality journal and conference papers"
      - "Contribute to lab infrastructure when relevant (datasets, benchmarks, tools)"
      - "Fully funded project-based positions"
    look:
      - "Urban AI and ML for design/planning decision support"
      - "Human–AI interaction for design tools"
      - "Spatial analytics, simulation, and benchmarking"
      - "Applied research with public/private partners"
    body: |
      **Our lab has project-funded postdoctoral positions.** To apply, send one PDF document (max 10MB) to [Dr. Haya Brama](mailto:hayab@ariel.ac.il) with the subject line "Postdoctoral application". The PDF should include:

      * CV
      * Cover letter describing your research interests and fit with the AAIRL
      * Up to 3 publications or work samples

      More details are available on Ariel University's [Postdocs website](https://www.ariel.ac.il/wp/postdocs/).
