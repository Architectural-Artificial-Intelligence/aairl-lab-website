topics:
  design-ai:
    title: "AI Design"
    intro: "We study how artificial intelligence can augment human creativity, collaboration, and judgment in architectural design and planning — and where it falls short."
    body: |
      Design is an iterative, situated, and highly visual form of reasoning. Our work in AI Design asks how computational systems can support that process without reducing it to prompt writing or automated image generation.

      We study AI as a collaborator in early-stage ideation, design communication, public participation, and evaluation. This includes conversational systems for participatory design, visual chatbots that can reason with diagrams and spatial representations, and methods for approximating selected dimensions of human response to architectural spaces.

      Our scientific focus is on when these systems are useful, when they fail, and how they alter the relationship between designers, stakeholders, and design evidence. We combine prototype development with empirical evaluation — user studies, design experiments, and comparisons with established participation and assessment methods.

      The long-term goal is not to replace designers, but to develop accountable AI tools that expand the kinds of feedback, representation, and reflection available during design — while keeping human judgment at the center of the process.
  smart-cities:
    title: "Smart Cities"
    intro: "Meaningful computational tools require a grounded understanding of the cities and communities they are built for."
    body: |
      Building useful computational tools for cities requires understanding how cities actually work — socially, spatially, and politically. A significant part of our research is therefore dedicated to studying urban life, not just modeling it.

      Our urban studies work examines several interconnected themes: the governance implications of smart city technologies; the social and spatial dynamics of urban renewal in Israel, including displacement, densification, and uneven benefit distribution; the spatial organization of religious and minority communities; and the political economy of planning institutions.

      This research is not a detour from our computational work — it is a foundation for it. Empirical knowledge of urban processes helps us identify where AI tools are needed, what they should be designed to do, and what risks they need to manage. It also helps us evaluate whether the tools we build reflect the complexity and equity concerns that matter in real planning practice.
  urban-ai:
    title: "Urban AI"
    intro: "We develop and evaluate AI methods for analyzing urban dynamics, predicting socio-economic outcomes, and supporting planning decisions — with explicit attention to model limitations, interpretability, and real-world validation."
    body: |
      Urban planning decisions are increasingly shaped by data, models, and digital platforms. Our Urban AI research examines how these technologies can be designed, evaluated, and governed so that they support planning practice rather than obscure it.

      We develop machine-learning models, decision-support systems, and urban digital twin methods for problems such as urban renewal, socio-economic impact assessment, parcel aggregation, and multi-domain urban simulation. These projects combine spatial data, planning knowledge, and computational modeling to help planners compare alternatives before interventions are implemented.

      We also study the known limitations of urban AI: fragmented and heterogeneous data, model bias, poor transferability across cities, and the difficulty of translating technical outputs into actionable planning evidence. Our work therefore emphasizes interpretability, rigorous benchmarking, and validation in real planning contexts alongside partner institutions.

      The aim is to establish urban AI as a reliable, auditable research and planning infrastructure — one that is useful not only under ideal conditions, but in the messy, data-scarce environments where most planning actually happens.
projects:
  chatbots:
    title: "Chatbots for Design"
    intro: "This project develops and evaluates conversational AI systems for public participation in architectural design and urban planning."
    body: |
      Chatbots for Design investigates how conversational AI can support public participation in architecture, urban design, and planning. The project develops and evaluates prototype systems that help design teams gather richer input, sustain dialogue with larger publics, and translate community knowledge into structured design evidence.

      The core challenge is scale. Public meetings, workshops, and surveys exclude people based on time, language, confidence, domain expertise, or physical access. Conversational systems offer a different participation channel: one that is available asynchronously, can adapt to different users, and can elicit more considered responses than conventional instruments.

      Our research is empirical: we test where chatbots perform well compared to established participation methods, where they fail, and how they should be integrated with human facilitation. We are especially interested in hybrid models, in which AI tools expand reach while in-person workshops continue to support trust, deliberation, and collective decision-making.

      Current work focuses on visual chatbots that communicate through text, diagrams, and spatial representations. These systems allow participants and designers to discuss proposals with reference to concrete spatial information, rather than abstract descriptions. The goal is not to replace public dialogue but to improve the interfaces between communities, design teams, and the complex information involved in planning decisions.
  synthetic-humans:
    title: "Synthetic Humans"
    intro: "This project investigates whether AI models can approximate selected dimensions of human spatial experience to provide early-stage design feedback — and rigorously identifies where they cannot."
    body: |
      Synthetic Humans asks a precise question: can computational models approximate selected aspects of human spatial experience in ways that are useful for early-stage architectural design evaluation?

      By "synthetic humans" we mean AI systems — specifically language models and vision-language models — that are evaluated for their ability to simulate bounded aspects of human response: attention patterns, affective ratings, preference judgments, and spatial legibility assessments. The claim is not that these models understand space. The claim is that their outputs may correlate sufficiently with human responses to be useful as low-cost, scalable evaluation signals at points in the design process where human feedback is unavailable or expensive.

      The project is motivated by a real gap in architectural practice. At early design stages, evaluation relies heavily on intuition and precedent. Physical mockups and user studies are resource-intensive. AI models, used carefully, may help designers compare alternatives, surface likely experiential patterns, and identify questions that warrant human validation.

      Current work benchmarks how large vision-language models rate architectural images across affective dimensions and compares those ratings against human participant data. We study correlation strength, failure modes, and the effect of representation style — including the finding that model-human agreement on negative emotional responses is substantially stronger than on positive ones. These distinctions matter for responsible use. Our goal is to identify precisely where AI can extend design evaluation and where it cannot substitute for the designer's judgment or the user's voice.
  urban-digital-twin:
    title: "METROPOLIS: Urban Digital Twin"
    intro: "An open, interoperable urban digital twin framework for integrating city data, deploying urban AI models, and supporting evidence-based planning."
    body: |
      METROPOLIS develops an open, interoperable urban digital twin framework for planning, simulation, and decision support. The project responds to a structural gap: cities increasingly need to evaluate the consequences of major planning decisions before implementation, but the technical infrastructure for doing so reliably does not yet exist at scale.

      Urban digital twins can in principle connect spatial data, real-time feeds, historical records, and predictive models into a unified analytical environment. In practice, however, these systems are difficult to build and maintain. Urban data is fragmented across agencies and vendors, stored in incompatible formats, and governed by different institutional standards. AI models require heterogeneous inputs that are rarely available in compatible forms, and cities lack the workflow orchestration and benchmarking tools needed to combine models into coherent planning processes.

      METROPOLIS addresses these challenges by contributing specific technical infrastructure: a data interoperability layer, a modular interface for deploying urban AI models, scenario-generation pipelines that orchestrate multiple models, and comparative evaluation benchmarks for assessing model performance across cities and planning contexts. The framework is validated through a pilot deployment with Tel Aviv.

      The project's contribution is infrastructure, not a single model or prediction. By making urban digital twin technology modular, documented, and replicable, METROPOLIS aims to lower the barrier for researchers and municipalities to build on each other's work and to establish practical standards for urban AI integration.
  urban-social-prediction:
    title: "Urban Social Prediction"
    intro: "This project develops and validates machine-learning models for anticipating the social and economic consequences of urban renewal, and translates these models into interpretable planning tools."
    body: |
      Urban Social Prediction develops machine-learning models and decision-support tools for anticipating the social and economic consequences of urban renewal. The project addresses a practical planning problem: renewal decisions have long-lasting effects on housing, displacement, and community resilience, but these consequences are rarely visible to planners at the time decisions are made.

      Urban renewal creates pressure on housing supply, infrastructure capacity, services, and social networks. It can bring investment and improved living conditions, but it can also produce displacement, unequal benefit distribution, and locally concentrated harm. This project uses data-driven methods to surface these dynamics before interventions are locked in.

      Our technical work combines predictive modeling, spatial analysis, and interpretable interfaces designed for use by planning practitioners. We study which socio-spatial factors shape renewal outcomes, how models generalize across different urban contexts, and how predictions should be communicated to planning teams so they inform decisions without being mistaken for prescriptions.

      The project also develops recommendation tools for strategic urban renewal planning. These tools help stakeholders compare parcel aggregation options, evaluate feasibility constraints, assess redevelopment potential, and reason about prioritization criteria. All outputs are designed to support deliberation rather than replace it — keeping social equity, local context, and planner judgment at the center of the process.

