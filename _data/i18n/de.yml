# Members
members:
  jonathan-dortheimer:
    name: "Jonathan Dortheimer"
    description: "Laborleiter"
    bio: |
      Jonathan Dortheimer ist Architekt, Pädagoge, Forscher und Gründer des Architectural Artificial Intelligence Research Lab an der Ariel University. Seine Arbeit untersucht, wie künstliche Intelligenz, computergestützte Methoden und partizipative Technologien architektonisches Design, Stadtplanung und transparentere Entscheidungsfindung unterstützen können.

      Jonathan ist Senior Lecturer an der [Ariel University School of Architecture](https://www.ariel.ac.il/wp/architecture/en/) und Gastwissenschaftler am [Lehrstuhl für Architekturinformatik der Technischen Universität München](https://www.arc.ed.tum.de/ai/team/jonathan-dortheimer/) in Deutschland.

      Er schloss sein Doktoratsstudium 2021 an der Tel Aviv University unter der Betreuung von Prof. [Eran Neuman](https://english.tau.ac.il/profile/eneuman) und Prof. [Tova Milo](https://english.tau.ac.il/profile/milo) ab. Anschließend arbeitete er als Postdoc-Forscher am Material Topology Research Lab am Technion in Zusammenarbeit mit dem Future Automation Lab an der Cornell Tech unter der Betreuung von Prof. [Aaron Sprecher](https://architecture.technion.ac.il/members/aaron-sprecher/) und Prof. [Wendy Ju](https://tech.cornell.edu/people/wendy-ju/).

      Jonathans Forschung entwickelt und evaluiert computergestützte Werkzeuge für partizipatives Design, urbane KI und urbane digitale Zwillinge. In all diesen Bereichen fragt seine Arbeit, wie KI architektonische und planerische Praxis sinnvoll unterstützen kann, ohne professionelle Verantwortung, öffentliche Deliberation oder lokales Wissen zu verdrängen.

      Neben seiner akademischen Arbeit hat Jonathan mehrere Technologieinitiativen gegründet und [Meirim](https://meirim.org/) mitgegründet, eine Plattform zur Förderung demokratischer Beteiligung an der Stadtplanung in Israel. Als seit 2008 eingetragener Architekt hat er gebaute Projekte entworfen, an Architekturwettbewerben teilgenommen und Design, Forschungsmethoden und Programmierung an der Tel Aviv University, dem Technion, der Ariel University, der TU München und der Cornell Tech gelehrt.
  haya-brama:
    name: "Haya Brama"
    bio: |
      Dr. Haya Brama ist Forscherin und Labormanagerin bei AAIRL und spezialisiert auf Deep Learning, maschinelles Lernen und KI-Anwendungen für architektonische und urbane Systeme.

      Sie schloss ihren Ph.D. in Neurowissenschaften an der Bar-Ilan University ab, wo sie biologische neuronale Netzwerke mit Populationsdynamik-Modellierung und In-vivo-elektrophysiologischen Aufzeichnungen untersuchte. Ihre Postdoc-Forschung an der Ariel University im Fachbereich Industrieingenieurwesen und Management erweiterte diese computergestützte Grundlage auf künstliche neuronale Netzwerke, Cybersicherheitsanwendungen und metaheuristische Suche.

      Von 2000 bis 2023 war Haya Chief Scientific Officer bei ARK, einem Startup, das KI-basierte Werkzeuge für automatisiertes architektonisches Design entwickelt. Diese Laufbahn — von der Systemneurowissenschaft zum angewandten maschinellen Lernen in der gebauten Umwelt — informiert ihre aktuelle Arbeit, die rigorose computergestützte Modellierung mit praktischen Planungs- und Designproblemen verbindet.
  orly-moas-cohen:
    name: "Orly Moas-Cohen"
    bio: |
      Orly Moas-Cohen ist Architektin, Stadtplanerin und Ph.D.-Forscherin bei AAIRL. Sie bringt umfangreiche Erfahrung in komplexen Planungsprozessen, städtischer und industrieller Erneuerung, Denkmalpflege, öffentlichem Dienst, Management und strategischer Beratung mit.

      Sie hat einen M.Arch. vom Technion und einen B.Arch. von der Ariel University. In über zwei Jahrzehnten Berufspraxis hat Orly Planungsteams geleitet, großangelegte Stadtprojekte vorangetrieben und in Planungsausschüssen mitgewirkt, darunter nationale und Bezirksausschüsse in Israel.

      Orly lehrt Architektur an der Ariel University und hält Vorlesungen über Architektur, Stadtentwicklung, Denkmalpflege und strategische Planung. Ihre Forschung verbindet professionelles Planungswissen mit dem Interesse des Labors an resilienter, sozial bewusster und evidenzbasierter Stadtentwicklung.

      In all ihrer Arbeit betont Orly menschenzentrierte Planung, städtische Lebensqualität und die langfristigen sozialen und ökologischen Folgen von Planungsentscheidungen.
  shay-skital:
    name: "Shay Skital"
    bio: |
      Shay Skital ist Architekt, Stadtplaner und Ph.D.-Forscher bei AAIRL. Er hat einen B.Arch. von der Ariel University und einen M.A. in Geografie und menschlicher Umwelt mit Spezialisierung auf Stadt- und Regionalplanung und -gestaltung von der Tel Aviv University.

      Vor seinem Eintritt in das Labor bekleidete Shay leitende Planungspositionen im öffentlichen Sektor, darunter Stadtarchitekt und Leiter der Planungsabteilung in mehreren Kommunen in Israel. Seine Berufsarbeit umfasste komplexe Planungsprozesse, Neuquartierplanung, Denkmalpflege, städtische Erneuerung, Gewerbe- und Beschäftigungszonen, touristisch orientierte Planung, öffentliche Gebäude und Gestaltung des öffentlichen Raums.

      Bei AAIRL verbindet Shays Forschung städtische Planungspraxis mit digitalen Werkzeugen für Stadtanalyse und Entscheidungsunterstützung. Seine Arbeit betont ortssensible Planung, lokale Identität und den Einsatz von Stadtdaten zur Verbesserung der Erfahrung und des Wertes, den Städte Bewohnern und Besuchern bieten.
  hila-david:
    name: "Hila David"
    bio: |
      Hila David ist Architektin und Masterstudentin bei AAIRL. Sie schloss ihren Bachelor an der Ariel University ab, wo ihr Abschlussprojekt den Azrieli-Preis für herausragende Abschlussprojekte erhielt.

      Vor ihrem Eintritt in das Labor arbeitete Hila als Architektin an Stadtplanungs-, öffentlichen Gebäude- und Wohnprojekten. Ihre Forschung konzentriert sich auf visuelle architektonische Kommunikation, einschließlich Diagramme, Darstellungstypen und deren Rolle in der Mensch-KI-Interaktion für das Design.
  adiya-karmon:
    name: "Adiya Karmon"
    bio: |
      Adiya Karmon ist Architekturstudentin an der Ariel University und Masterstudentin in nachhaltiger Architektur. Ihre Forschung bei AAIRL untersucht parametrische Stadtplanung als Methode zur Unterstützung einer informierteren und umweltbewussteren Stadtplanung.

      Ihre Arbeit verbindet architektonisches Design, computergestützte Methoden und nachhaltige Stadtentwicklung mit dem Schwerpunkt darauf, wie Planungswerkzeuge helfen können, Alternativen zu bewerten und die Qualität der gebauten Umwelt zu verbessern.
  bnaya-unger:
    name: "Bnaya Unger"
    bio: |
      Bnaya Unger ist B.Sc.-Student in Industrieingenieurwesen und Management sowie Honors-Track M.Sc.-Student in Industrieingenieurwesen und Management. Seine Forschung bei AAIRL konzentriert sich auf Entscheidungsunterstützung bei der städtischen Erneuerung.

      Als Teil eines kollaborativen Projekts mit Green Group untersucht Bnaya die Parzellenaggregation für städtische Erneuerung. Seine Arbeit wendet maschinelles Lernen und Deep-Learning-Methoden an, um vielversprechende Parzellenverbindungen zu identifizieren und transparentere, evidenzbasierte Planungsentscheidungen zu unterstützen.
  elior-dahan:
    name: "Elior Dahan"
    bio: |
      Elior Dahan ist B.Sc.-Student in Industrieingenieurwesen und Management sowie Honors-Track M.Sc.-Student in Industrieingenieurwesen und Management. Seine Arbeit bei AAIRL trägt zur Urban-Digital-Twin-Forschung des Labors bei.

      Elior untersucht, wie Stadtdaten, computergestützte Modelle und KI-basierte Analysen transparentere und evidenzbasierte Planungsprozesse unterstützen können. Seine Arbeit ist mit dem Bestreben des Labors verbunden, interoperable digitale Infrastruktur für urbane Simulation, Entscheidungsunterstützung und Modellevaluierung zu entwickeln.
  gaya-bitman:
    name: "Gaya Bitman"
    bio: |
      Gaya Bitman ist Architekturstudentin an der Ariel School of Architecture und Masterstudentin bei AAIRL. Ihre Forschung untersucht computergestützte Designmethoden für architektonische Probleme, die durch kulturelle, religiöse und räumliche Einschränkungen geprägt sind.

      Ihre aktuelle Arbeit untersucht den Einsatz genetischer Algorithmen im Design religiöser Architektur. Die Forschung verbindet regelbasiertes Design, Optimierung und architektonisches Denken und zeigt, wie computergestützte Methoden Designern helfen können, eingeschränkte Entwurfsräume systematischer zu erkunden.
  michael-sharon:
    name: "Michael Sharon"
    bio: |
      Michael Sharon ist Architekturstudent an der Ariel School of Architecture und Forschungsassistent bei AAIRL. Seine Arbeit erforscht fortgeschrittene computergestützte Methoden für architektonisches Design.

      Michaels aktuelle Forschung konzentriert sich darauf, wie Quantencomputing und verwandte computergestützte Ansätze komplexe Designprobleme unterstützen können. Seine Arbeit verbindet architektonisches Denken, computergestütztes Design und aufkommende Technologien zur Erkundung neuer Arten der Designsuche und -bewertung.
  ofir-glassman:
    name: "Ofir Glassman"
    bio: |
      Ofir Glassman ist Architekturstudentin an der Ariel School of Architecture und Forschungsassistentin bei AAIRL. Ihre Arbeit konzentriert sich auf die Schnittstelle von architektonischem Design, KI und menschlicher Erfahrung in gebauten Umgebungen.

      Ofirs Forschung untersucht, wie KI Aspekte menschlichen Verhaltens und räumlicher Reaktion annähern kann und Designern hilft, gebaute Umgebungen über konventionelle Leistungskennzahlen hinaus zu bewerten. Ihre Arbeit trägt zu den Synthetic-Humans- und Design-AI-Forschungsrichtungen des Labors bei.
  gal-gendler:
    name: "Gal Gendler"
    bio: |
      Gal Gendler ist ein multidisziplinärer Forscher mit Expertise in Software-Engineering, öffentlicher Politik und Stadtplanung. Er hat einen B.Sc. in Informatik, einen M.A. in öffentlicher Politik und einen M.Sc. mit Auszeichnung vom UCL in Transport- und Stadtplanung.

      Vor seinem Eintritt bei AAIRL arbeitete Gal im Technologiesektor als Software-Engineer mit Spezialisierung auf geografische Informationssysteme, Big Data und Transportplanung. Dieser Hintergrund informiert seine Forschung zu urbanen KI-Plattformen, räumlicher Dateninfrastruktur und Planungsentscheidungsunterstützungssystemen.

      Gals Arbeit bei AAIRL konzentrierte sich auf die Politik der städtischen Erneuerung und die Entwicklung einer urbanen KI-Plattform für das Hosting von maschinellen Lernmodellen für die gebaute Umwelt. Seine Forschung trug zu dem umfassenderen Bemühen des Labors bei, urbane Analytik interoperabler, transparenter und für die Planungspraxis nützlicher zu machen.
  gal-guz:
    name: "Gal Guz"
    bio: |
      Gal Guz ist Architekturstudent, UX/UI-Designer und Alumnus von AAIRL. Seine Arbeit kombiniert architektonisches Design, Interface-Design und Software-Entwicklung für komplexe Forschungssysteme.

      Bei AAIRL trug Gal zu Projekten zur KI-gestützten architektonischen Bewertung und zur Entscheidungsunterstützung in der Stadtplanung bei. Seine Arbeit umfasste Interface-Design für Systeme zur Vorhersage sozialer Auswirkungen der städtischen Erneuerung und Forschung darüber, ob KI-Werkzeuge menschliche Reaktionen auf gebaute Räume annähern können.

      Gals Designpraxis umfasst Nutzeranforderungen, Entwicklung von Betriebskonzepten, Prototyping, Nutzertests, Design-Systeme und Entwicklungs-Handoff. Er arbeitet hauptsächlich mit dem React-Ökosystem und 3D-Web-Technologien wie Three.js.
  ela-moyal:
    name: "Ela Moyal"
    bio: |
      Ela Moyal ist Architektin und Alumna von AAIRL. Ihre Forschung untersuchte die Politik der städtischen Erneuerung in Israel mit dem Schwerpunkt auf Fassadenrenovierungsprogrammen in Tel Aviv und deren Auswirkungen auf Stadtgestaltung, Wohnqualität und das gelebte Erleben der Bewohner.

      Ihre Arbeit trug zur Stadtforschung des Labors bei, die untersucht, wie Planungspolitik und Entwicklungsmechanismen gebaute Umgebungen und Gemeinschaften prägen.
  gilad-chalfon:
    name: "Gilad Chalfon"
    bio: |
      Gilad Chalfon ist Architekt und Alumnus von AAIRL. Seine Forschung untersuchte die politischen und sozialen Implikationen von Smart-City-Anwendungen mit dem Schwerpunkt darauf, wie Parktechnologien als Instrumente der Privatisierung und Governance in israelischen Städten fungieren.

      Seine Arbeit trug zur kritischen Stadtforschung des Labors bei, die die Machtverhältnisse und institutionellen Verantwortlichkeiten in digitalen Systemen für Städte untersucht.
  lielle-brenner:
    name: "Lielle Brenner"
    bio: |
      Lielle Brenner ist Alumna von AAIRL. Ihre Arbeit trug zur Design-AI-Forschung des Labors bei, die untersucht, wie KI architektonische Kreativität, Designkommunikation und empirische Bewertung gebauter Umgebungen unterstützen kann.

jobs:
  phd:
    title: "Doktorat"
    intro: "Wir begrüßen Doktoratskandidaten, die rigorose Forschung an der Schnittstelle von KI und architektonischer oder urbaner Planungspraxis betreiben möchten, verankert in realen Anforderungen und entwickelt in Zusammenarbeit mit kommunalen und Industriepartnern."
    about:
      - "Entwicklung einer Forschungsagenda rund um ein reales Planungs- und Designproblem"
      - "Entwicklung von Methoden oder Werkzeugen und empirische Validierung"
      - "Arbeit mit realen Daten und in vielen Fällen Partner-Feedbackschleifen"
      - "Publizieren während des gesamten Doktorats, oft als Erstautor"
      - "Beitrag zur Laborinfrastruktur (Datensätze, Benchmarks, Werkzeuge)"
      - "Vollständig finanzierte projektbasierte Stellen"
    look:
      - "Starke Motivation für Forschung und Schreiben"
      - "Quantitative oder computationelle Fähigkeiten (ML, Statistik, Simulation, Optimierung)"
      - "Fähigkeit, selbständig zu arbeiten und gleichzeitig mit der Gruppe zusammenzuarbeiten"
      - "Hintergründe aus Architektur, Informatik, Ingenieurwesen, Stadtforschung willkommen"
    body: |
      **Unser Labor hat projektfinanzierte Doktorandenstellen.** Um Interesse zu bekunden, senden Sie eine E-Mail an [Dr. Haya Brama](mailto:hayab@ariel.ac.il) mit dem Betreff „PhD inquiry" und fügen Sie bei:

      * Lebenslauf
      * Zeugnisse
      * Ein kurzer Absatz, der Ihre Interessen und relevante Erfahrungen beschreibt
      * (Optional) Schreibprobe / Portfolio / GitHub / frühere Abschlussarbeit

      Weitere Details finden Sie auf der [PhD-Website der Ariel University](https://www.ariel.ac.il/wp/graduate-school/en/applicants/).
  master:
    title: "Master-Thesis-Track"
    intro: "Wir nehmen MSc-Studierende nur im Thesis-Track auf. Dieser Track eignet sich am besten für Studierende, die einen Doktorat in Betracht ziehen oder eine tiefere Forschungsausbildung wünschen. Im Labor arbeiten die Studierenden praktisch mit echten Datensätzen und Forschungsfragen aus laufenden Laborprojekten."
    about:
      - "Erwerb von Forschungskompetenz, starkem Portfolio und realistischem Blick auf akademische und angewandte Forschung"
      - "Durchführung eines Forschungsprojekts"
      - "Entwicklung von Methoden oder Werkzeugen und empirische Validierung"
      - "Eine schriftliche Abschlussarbeit mit klarem Beitrag"
      - "Oft Einreichung bei einer Konferenz oder einem Journal"
    look:
      - "Starke Motivation für Forschung und Schreiben"
      - "Interesse an computergestützter, empirischer oder designorientierter Forschung"
      - "Fähigkeit, selbständig zu arbeiten und enge Betreuung zu erhalten"
      - "Relevante Kenntnisse in Design, Planung, Datenanalyse, Programmierung oder räumlichen Werkzeugen"
      - "Verfügbarkeit für nachhaltige Abschlussarbeit in laufenden Laborprojekten"
    body: |
      Senden Sie eine E-Mail an [Dr. Haya Brama](mailto:hayab@ariel.ac.il) mit Lebenslauf und Zeugnissen, mit dem Betreff „Master's Thesis Application".
      Fügen Sie im E-Mail-Text bei:

      * Ihr Studiengang und Jahrgang
      * Eine kurze Beschreibung Ihrer Interessen (2–3 Themen)
      * Relevante Fähigkeiten (Software/Werkzeuge/Kurse) und wöchentliche Verfügbarkeit

      Weitere Details finden Sie auf der [MSc-Architektur-Website der Ariel University](https://www.ariel.ac.il/wp/architecture/m-d/).
  postdoc:
    title: "Postdoktoranden"
    intro: "Wir suchen Postdoktoranden mit einem starken quantitativen oder computationellen Hintergrund, die hochimpaktive Arbeit in Urban AI, computergestütztem Design, räumlicher Analyse oder datengesteuerter Planung leisten möchten."
    about:
      - "Entwicklung einer Forschungsagenda rund um ein reales Planungs- und Designproblem"
      - "Entwicklung von Methoden oder Werkzeugen und empirische Validierung"
      - "Arbeit mit realen Daten und in vielen Fällen Partner-Feedbackschleifen"
      - "Veröffentlichung hochwertiger Journal- und Konferenzartikel"
      - "Beitrag zur Laborinfrastruktur (Datensätze, Benchmarks, Werkzeuge)"
      - "Vollständig finanzierte projektbasierte Stellen"
    look:
      - "Urban AI und ML für Design-/Planungsentscheidungsunterstützung"
      - "Mensch–KI-Interaktion für Design-Werkzeuge"
      - "Räumliche Analyse, Simulation und Benchmarking"
      - "Angewandte Forschung mit öffentlichen/privaten Partnern"
    body: |
      **Unser Labor hat projektfinanzierte Postdoktorandenstellen.** Senden Sie ein PDF-Dokument (max. 10 MB) an [Dr. Haya Brama](mailto:hayab@ariel.ac.il) mit dem Betreff „Postdoctoral application". Das PDF sollte enthalten:

      * Lebenslauf
      * Motivationsschreiben, das Ihre Forschungsinteressen und die Eignung für AAIRL beschreibt
      * Bis zu 3 Publikationen oder Arbeitsproben

      Weitere Details finden Sie auf der [Postdoc-Website der Ariel University](https://www.ariel.ac.il/wp/postdocs/).
