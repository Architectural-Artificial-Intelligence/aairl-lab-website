topics:
  design-ai:
    title: "KI im Design"
    intro: "Wir untersuchen, wie künstliche Intelligenz menschliche Kreativität, Zusammenarbeit und Urteilsvermögen im architektonischen Design und in der Planung erweitern kann — und wo sie an ihre Grenzen stößt."
    body: |
      Design ist eine iterative, situierte und hochgradig visuelle Form des Denkens. Unsere Arbeit im Bereich KI-Design fragt, wie computergestützte Systeme diesen Prozess unterstützen können, ohne ihn auf Prompt-Schreiben oder automatisierte Bildgenerierung zu reduzieren.

      Wir untersuchen KI als Kollaborateur in der frühen Ideenfindung, der Designkommunikation, der öffentlichen Beteiligung und der Bewertung. Dazu gehören Konversationssysteme für partizipatives Design, visuelle Chatbots, die mit Diagrammen und räumlichen Darstellungen arbeiten können, sowie Methoden zur Annäherung an ausgewählte Dimensionen menschlicher Reaktion auf architektonische Räume.

      Unser wissenschaftlicher Fokus liegt darauf, wann diese Systeme nützlich sind, wann sie versagen und wie sie die Beziehung zwischen Designenden, Stakeholdern und Designbelegen verändern. Wir kombinieren Prototypentwicklung mit empirischer Evaluation — Nutzerstudien, Designexperimente und Vergleiche mit etablierten Beteiligungs- und Bewertungsmethoden.

      Das langfristige Ziel ist nicht, Designende zu ersetzen, sondern verantwortungsvolle KI-Werkzeuge zu entwickeln, die die Arten von Feedback, Darstellung und Reflexion erweitern, die beim Design verfügbar sind — während das menschliche Urteil im Mittelpunkt des Prozesses bleibt.
  smart-cities:
    title: "Smart Cities"
    intro: "Sinnvolle computergestützte Werkzeuge erfordern ein fundiertes Verständnis der Städte und Gemeinschaften, für die sie entwickelt werden."
    body: |
      Nützliche computergestützte Werkzeuge für Städte zu entwickeln erfordert ein Verständnis dafür, wie Städte tatsächlich funktionieren — sozial, räumlich und politisch. Ein wesentlicher Teil unserer Forschung ist daher dem Studium des städtischen Lebens gewidmet, nicht nur seiner Modellierung.

      Unsere stadtforscherische Arbeit untersucht mehrere miteinander verbundene Themen: die Governance-Implikationen von Smart-City-Technologien; die sozialen und räumlichen Dynamiken der städtischen Erneuerung in Israel, einschließlich Verdrängung, Verdichtung und ungleicher Nutzenverteilung; die räumliche Organisation religiöser und Minderheitengemeinschaften; und die politische Ökonomie von Planungsinstitutionen.

      Diese Forschung ist kein Umweg von unserer computergestützten Arbeit — sie ist deren Grundlage. Empirisches Wissen über städtische Prozesse hilft uns zu erkennen, wo KI-Werkzeuge gebraucht werden, was sie leisten sollen und welche Risiken sie managen müssen. Es hilft uns auch zu bewerten, ob die von uns entwickelten Werkzeuge die Komplexität und Gerechtigkeitsanliegen widerspiegeln, die in realer Planungspraxis wichtig sind.
  urban-ai:
    title: "Urban AI"
    intro: "Wir entwickeln und evaluieren KI-Methoden zur Analyse städtischer Dynamiken, zur Vorhersage sozioökonomischer Ergebnisse und zur Unterstützung von Planungsentscheidungen — mit besonderem Augenmerk auf Modellgrenzen, Interpretierbarkeit und Validierung in der Praxis."
    body: |
      Stadtplanerische Entscheidungen werden zunehmend durch Daten, Modelle und digitale Plattformen geprägt. Unsere Urban-AI-Forschung untersucht, wie diese Technologien so gestaltet, evaluiert und gesteuert werden können, dass sie die Planungspraxis unterstützen und nicht verschleiern.

      Wir entwickeln Machine-Learning-Modelle, Entscheidungsunterstützungssysteme und urbane Digital-Twin-Methoden für Probleme wie städtische Erneuerung, sozioökonomische Folgenabschätzung, Parzellenaggregation und multidisziplinäre Stadtsimulation. Diese Projekte kombinieren Raumdaten, Planungswissen und computergestütztes Modellieren, um Planenden zu helfen, Alternativen zu vergleichen, bevor Maßnahmen umgesetzt werden.

      Wir untersuchen auch die bekannten Grenzen von Urban AI: fragmentierte und heterogene Daten, Modellverzerrungen, schlechte Übertragbarkeit auf andere Städte und die Schwierigkeit, technische Outputs in verwertbare Planungsbelege zu übersetzen. Unsere Arbeit betont daher Interpretierbarkeit, rigoroses Benchmarking und Validierung in realen Planungskontexten gemeinsam mit Partnerinstitutionen.

      Das Ziel ist, Urban AI als zuverlässige, überprüfbare Forschungs- und Planungsinfrastruktur zu etablieren — eine, die nicht nur unter idealen Bedingungen nützlich ist, sondern auch in den datenschwachen, komplexen Umgebungen, in denen die meiste reale Planung stattfindet.
projects:
  chatbots:
    title: "Chatbots für das Design"
    intro: "Dieses Projekt entwickelt und evaluiert konversationelle KI-Systeme für die öffentliche Beteiligung an architektonischem Design und Stadtplanung."
    body: |
      Chatbots für das Design untersucht, wie konversationelle KI die öffentliche Beteiligung an Architektur, Stadtgestaltung und Planung unterstützen kann. Das Projekt entwickelt und evaluiert Prototypsysteme, die Planungsteams dabei helfen, reichhaltigere Beiträge zu sammeln, den Dialog mit einem breiteren Publikum aufrechtzuerhalten und kommunales Wissen in strukturierte Planungsbelege zu übersetzen.

      Die zentrale Herausforderung ist die Skalierbarkeit. Öffentliche Sitzungen, Workshops und Umfragen schließen Menschen aufgrund von Zeit, Sprache, Selbstvertrauen, Fachkenntnissen oder physischem Zugang aus. Konversationssysteme bieten einen anderen Beteiligungskanal: einen, der asynchron verfügbar ist, sich an verschiedene Nutzende anpassen kann und durchdachtere Antworten hervorrufen kann als konventionelle Instrumente.

      Unsere Forschung ist empirisch: Wir testen, wo Chatbots im Vergleich zu etablierten Beteiligungsmethoden gut funktionieren, wo sie versagen und wie sie mit menschlicher Moderation integriert werden sollten. Wir interessieren uns besonders für hybride Modelle, bei denen KI-Werkzeuge die Reichweite erweitern, während persönliche Workshops weiterhin Vertrauen, Deliberation und kollektive Entscheidungsfindung unterstützen.

      Die aktuelle Arbeit konzentriert sich auf visuelle Chatbots, die durch Text, Diagramme und räumliche Darstellungen kommunizieren. Diese Systeme ermöglichen es Teilnehmenden und Planenden, Vorschläge anhand konkreter räumlicher Informationen zu besprechen, anstatt abstrakte Beschreibungen zu verwenden. Das Ziel ist nicht, den öffentlichen Dialog zu ersetzen, sondern die Schnittstellen zwischen Gemeinschaften, Planungsteams und den komplexen Informationen in Planungsprozessen zu verbessern.
  synthetic-humans:
    title: "Synthetische Menschen"
    intro: "Dieses Projekt untersucht, ob KI-Modelle ausgewählte Dimensionen menschlicher räumlicher Erfahrung annähern können, um frühzeitiges Designfeedback zu liefern — und identifiziert rigoros, wo sie es nicht können."
    body: |
      Synthetische Menschen stellt eine präzise Frage: Können computergestützte Modelle ausgewählte Aspekte menschlicher räumlicher Erfahrung so annähern, dass sie für die frühe architektonische Designbewertung nützlich sind?

      Mit „synthetischen Menschen" meinen wir KI-Systeme — insbesondere Sprachmodelle und Vision-Language-Modelle —, die auf ihre Fähigkeit hin evaluiert werden, begrenzte Aspekte menschlicher Reaktionen zu simulieren: Aufmerksamkeitsmuster, affektive Bewertungen, Präferenzurteile und Beurteilungen der räumlichen Lesbarkeit. Die Behauptung ist nicht, dass diese Modelle Raum verstehen. Die Behauptung ist, dass ihre Ausgaben möglicherweise ausreichend mit menschlichen Reaktionen korrelieren, um als kostengünstige, skalierbare Bewertungssignale an Punkten im Designprozess nützlich zu sein, an denen menschliches Feedback nicht verfügbar oder teuer ist.

      Das Projekt ist durch eine reale Lücke in der Architekturpraxis motiviert. In frühen Designphasen stützt sich die Bewertung stark auf Intuition und Präzedenzfälle. Physische Modelle und Nutzerstudien sind ressourcenintensiv. KI-Modelle, sorgfältig eingesetzt, können Designern helfen, Alternativen zu vergleichen, wahrscheinliche Erfahrungsmuster zu identifizieren und Fragen zu erkennen, die eine menschliche Validierung erfordern.

      Die aktuelle Arbeit benchmarkt, wie große Vision-Language-Modelle Architekturbilder anhand affektiver Dimensionen bewerten, und vergleicht diese Bewertungen mit menschlichen Teilnehmerdaten. Wir untersuchen die Korrelationsstärke, Fehlermodi und den Einfluss des Darstellungsstils — einschließlich der Erkenntnis, dass die Modell-Mensch-Übereinstimmung bei negativen emotionalen Reaktionen deutlich stärker ist als bei positiven. Diese Unterschiede sind für einen verantwortungsvollen Einsatz wichtig. Unser Ziel ist es, genau zu identifizieren, wo KI die Designbewertung erweitern kann und wo sie nicht das Urteil des Designers oder die Stimme des Nutzers ersetzen kann.
  urban-digital-twin:
    title: "METROPOLIS: Urbaner Digitaler Zwilling"
    intro: "Ein offenes, interoperables urbanes Digital-Twin-Framework zur Integration von Stadtdaten, Bereitstellung urbaner KI-Modelle und Unterstützung evidenzbasierter Planung."
    body: |
      METROPOLIS entwickelt ein offenes, interoperables urbanes Digital-Twin-Framework für Planung, Simulation und Entscheidungsunterstützung. Das Projekt reagiert auf eine strukturelle Lücke: Städte müssen zunehmend die Konsequenzen wichtiger Planungsentscheidungen vor der Umsetzung bewerten, aber die technische Infrastruktur dafür existiert noch nicht zuverlässig im großen Maßstab.

      Urbane digitale Zwillinge können im Prinzip räumliche Daten, Echtzeit-Feeds, historische Aufzeichnungen und Vorhersagemodelle in eine einheitliche analytische Umgebung verbinden. In der Praxis sind diese Systeme jedoch schwer aufzubauen und zu pflegen. Stadtdaten sind über Behörden und Anbieter fragmentiert, in inkompatiblen Formaten gespeichert und nach unterschiedlichen institutionellen Standards verwaltet. KI-Modelle erfordern heterogene Eingaben, die selten in kompatiblen Formen verfügbar sind, und Städten fehlen die Workflow-Orchestrierungs- und Benchmarking-Tools, die erforderlich sind, um Modelle zu kohärenten Planungsprozessen zu kombinieren.

      METROPOLIS adressiert diese Herausforderungen durch spezifische technische Infrastruktur: eine Daten-Interoperabilitätsschicht, eine modulare Schnittstelle zur Bereitstellung urbaner KI-Modelle, Szenario-Generierungs-Pipelines zur Orchestrierung mehrerer Modelle und vergleichende Evaluierungs-Benchmarks zur Bewertung der Modellleistung über Städte und Planungskontexte hinweg. Das Framework wird durch ein Pilotprojekt mit Tel Aviv validiert.

      Der Beitrag des Projekts ist Infrastruktur, kein einzelnes Modell oder eine einzelne Vorhersage. Indem METROPOLIS die urbane Digital-Twin-Technologie modular, dokumentiert und replizierbar macht, zielt es darauf ab, die Hürde für Forschende und Kommunen zu senken, auf der Arbeit der anderen aufzubauen und praktische Standards für die urbane KI-Integration zu etablieren.
  urban-social-prediction:
    title: "Urbane Sozialprognose"
    intro: "Dieses Projekt entwickelt und validiert maschinelle Lernmodelle zur Antizipation der sozialen und wirtschaftlichen Folgen urbaner Erneuerung und übersetzt diese Modelle in interpretierbare Planungswerkzeuge."
    body: |
      Urbane Sozialprognose entwickelt Modelle des maschinellen Lernens und Entscheidungsunterstützungswerkzeuge zur Antizipation der sozialen und wirtschaftlichen Folgen urbaner Erneuerung. Das Projekt adressiert ein praktisches Planungsproblem: Erneuerungsentscheidungen haben langanhaltende Auswirkungen auf Wohnraum, Verdrängung und Resilienz von Gemeinschaften, aber diese Konsequenzen sind für Planer zum Zeitpunkt der Entscheidungsfindung selten sichtbar.

      Urbane Erneuerung erzeugt Druck auf Wohnungsangebot, Infrastrukturkapazität, Dienstleistungen und soziale Netzwerke. Sie kann Investitionen und verbesserte Lebensbedingungen bringen, kann aber auch Verdrängung, ungleiche Nutzenverteilung und lokal konzentrierten Schaden verursachen. Dieses Projekt nutzt datengetriebene Methoden, um diese Dynamiken sichtbar zu machen, bevor Interventionen festgelegt werden.

      Unsere technische Arbeit kombiniert Vorhersagemodellierung, räumliche Analyse und interpretierbare Schnittstellen, die für den Einsatz durch Planungspraktiker konzipiert sind. Wir untersuchen, welche sozioräumlichen Faktoren Erneuerungsergebnisse prägen, wie Modelle über verschiedene städtische Kontexte hinweg verallgemeinern und wie Vorhersagen an Planungsteams kommuniziert werden sollten, damit sie Entscheidungen informieren, ohne als Vorschriften missverstanden zu werden.

      Das Projekt entwickelt auch Empfehlungswerkzeuge für strategische Stadtentwicklungsplanung. Diese Werkzeuge helfen Interessengruppen, Parzellenaggregationsoptionen zu vergleichen, Machbarkeitsbeschränkungen zu bewerten, Entwicklungspotenziale einzuschätzen und über Priorisierungskriterien nachzudenken. Alle Ausgaben sind darauf ausgelegt, Deliberation zu unterstützen, nicht zu ersetzen — soziale Gerechtigkeit, lokaler Kontext und das Urteil der Planer bleiben im Mittelpunkt des Prozesses.

