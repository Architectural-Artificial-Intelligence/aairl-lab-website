{% assign t = site.data.i18n[site.active_lang] | default: site.data.i18n.en %}
{% if site.active_lang == site.default_lang %}{% assign lp = '' %}{% else %}{% assign lp = '/' | append: site.active_lang %}{% endif %}

<section class="promembership_section decoration_wrap">
    <div class="container">
      <div class="row align-items-center">
        <div class="col col-lg-3">
          <div class="item_image">
            <div class="deco_item deco_img_1" data-parallax='{"rotateZ" : 180, "smoothness": 6}' aria-hidden="true">
              <img src="/images/shapes/dot_shape_7.png" alt="">
            </div>
          </div>
        </div>
        <div class="col col-lg-6">
          <h2 class="title_text">
            {{ t.join_title }}
          </h2>
          <p>
            {{ t.join_body }}
          </p>
        </div>
        <div class="col col-lg-3">
          <a class="btn btn_default" href="{{ lp }}/jobs">
            <span>
              <small>{{ t.join_cta }}</small>
              <small>{{ t.join_cta }}</small>
            </span>
            <i class="far fa-long-arrow-right ms-1"></i>
          </a>
        </div>
      </div>
    </div>
    <div class="deco_item deco_img_2" data-parallax='{"rotateZ" : 45, "smoothness": 6}' aria-hidden="true">
      <img src="/images/shapes/shape_9.png" alt="">
    </div>
  </section>
